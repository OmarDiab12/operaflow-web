<app-page-header
  title="Customers"
  description="Know which customers are happy, who needs attention, and which renewals or repeat orders are coming up."
  actionLabel="Add customer"
  actionIcon="person_add"
/>

<section class="table-panel">
  <div class="table-heading">
    <div>
      <p>Customer list</p>
      <h2>Accounts to keep close</h2>
    </div>
    <button mat-stroked-button type="button">
      <mat-icon>filter_list</mat-icon>
      Filter
    </button>
  </div>

  <div class="responsive-table">
    <table>
      <thead>
        <tr>
          <th>Company</th>
          <th>Type</th>
          <th>Health</th>
          <th>Monthly value</th>
          <th>Owner</th>
          <th>Renewal</th>
        </tr>
      </thead>
      <tbody>
        @for (customer of data.customers(); track customer.company) {
          <tr>
            <td>
              <strong>{{ customer.company }}</strong>
            </td>
            <td>{{ customer.segment }}</td>
            <td><app-status-pill [status]="customer.health" /></td>
            <td>{{ customer.arr }}</td>
            <td>{{ customer.owner }}</td>
            <td>{{ customer.renewal }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
