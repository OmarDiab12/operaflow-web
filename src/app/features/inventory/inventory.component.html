<app-page-header
  title="Stock"
  description="Spot low stock, overstock, and reorder needs early so orders keep moving without surprises."
  actionLabel="Sync stock"
  actionIcon="sync"
/>

<section class="table-panel">
  <div class="table-heading">
    <div>
      <p>Stock check</p>
      <h2>{{ data.inventoryPressure() }} item needs attention</h2>
    </div>
    <button mat-stroked-button type="button">
      <mat-icon>warehouse</mat-icon>
      Locations
    </button>
  </div>

  <div class="responsive-table">
    <table>
      <thead>
        <tr>
          <th>SKU</th>
          <th>Item</th>
          <th>Location</th>
          <th>Stock</th>
          <th>Reorder at</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        @for (item of data.inventory(); track item.sku) {
          <tr>
            <td>
              <strong>{{ item.sku }}</strong>
            </td>
            <td>{{ item.item }}</td>
            <td>{{ item.location }}</td>
            <td>{{ item.stock }}</td>
            <td>{{ item.reorderPoint }}</td>
            <td><app-status-pill [status]="item.status" /></td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
