<app-page-header
  title="Work in progress"
  description="See the jobs your team is working on, who owns each one, what is urgent, and what is due next."
  actionLabel="Add job"
  actionIcon="add"
/>

<section class="ops-board">
  @for (operation of data.operations(); track operation.id) {
    <article class="operation-card">
      <div class="card-top">
        <span>{{ operation.id }}</span>
        <app-status-pill [status]="operation.priority" />
      </div>
      <h2>{{ operation.workflow }}</h2>
      <p>{{ operation.owner }} is handling this</p>
      <mat-progress-bar mode="determinate" [value]="operation.completion" />
      <div class="meta">
        <span>{{ operation.completion }}% done</span>
        <strong>{{ operation.eta }}</strong>
      </div>
      <footer>
        <app-status-pill [status]="operation.status" />
        <button mat-icon-button type="button" aria-label="Open operation">
          <mat-icon>arrow_forward</mat-icon>
        </button>
      </footer>
    </article>
  }
</section>
